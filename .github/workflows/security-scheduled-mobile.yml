name: security-scheduled-mobile

# セキュリティ強化 Phase 2 / 2a（非同期の定期スキャン）。
#   - semgrep     … SAST（Dart/Flutter コードの静的解析）→ SARIF を code scanning へ
#   - secret-scan … gitleaks（git 履歴を含むシークレット検知）
#   - dep-scan    … Trivy で pubspec.lock の依存脆弱性を全件スキャン → SARIF
#
# PR ゲートではなく schedule 起動の深掘り検知。検知は code scanning に集約し、
# トリアージ後に hw-hub-manage へ Issue 化して Sprint backlog に合流させる。

on:
  schedule:
    - cron: "0 0 * * 1" # 毎週月曜 00:00 UTC（= 月曜 09:00 JST）
  workflow_dispatch:

permissions:
  contents: read
  security-events: write # SARIF を code scanning にアップロードするため

jobs:
  # --- SAST（Semgrep・全コード静的解析） ----------------------------------
  semgrep:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Semgrep scan (SARIF)
        run: |
          python -m pip install --quiet semgrep
          semgrep scan --config p/security-audit --config p/secrets \
            --sarif --output semgrep.sarif || true

      - name: Upload Semgrep SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  # --- 依存パッケージの脆弱性（Trivy / pubspec.lock 全件） -----------------
  dep-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Trivy fs (pubspec.lock) SARIF
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          format: sarif
          output: trivy-deps.sarif
          severity: CRITICAL,HIGH,MEDIUM,LOW
          exit-code: "0"

      - name: Upload Trivy SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-deps.sarif
          category: trivy-deps

  # --- シークレット混入スキャン（gitleaks・履歴含む） ----------------------
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: gitleaks (secret scan, history included)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_ENABLE_SUMMARY: "true"
